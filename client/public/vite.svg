<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="transparent"/>
  
  <!-- Neural Network Design -->
  <!-- Center node (brain) -->
  <circle cx="16" cy="16" r="4" fill="url(#aiGradient)" filter="url(#glow)"/>
  
  <!-- Outer nodes -->
  <circle cx="8" cy="8" r="2.5" fill="url(#aiGradient)" opacity="0.8"/>
  <circle cx="24" cy="8" r="2.5" fill="url(#aiGradient)" opacity="0.8"/>
  <circle cx="8" cy="24" r="2.5" fill="url(#aiGradient)" opacity="0.8"/>
  <circle cx="24" cy="24" r="2.5" fill="url(#aiGradient)" opacity="0.8"/>
  
  <!-- Connecting lines (neural connections) -->
  <line x1="8" y1="8" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="8" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="8" y1="24" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="24" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Additional connection nodes -->
  <circle cx="16" cy="6" r="1.8" fill="url(#aiGradient)" opacity="0.7"/>
  <circle cx="26" cy="16" r="1.8" fill="url(#aiGradient)" opacity="0.7"/>
  <circle cx="16" cy="26" r="1.8" fill="url(#aiGradient)" opacity="0.7"/>
  <circle cx="6" cy="16" r="1.8" fill="url(#aiGradient)" opacity="0.7"/>
  
  <!-- Additional connections -->
  <line x1="16" y1="6" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.2" opacity="0.5"/>
  <line x1="26" y1="16" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="26" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.2" opacity="0.5"/>
  <line x1="6" y1="16" x2="16" y2="16" stroke="url(#aiGradient)" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Glow effect on center -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="url(#aiGradient)" stroke-width="0.5" opacity="0.3"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="url(#aiGradient)" stroke-width="0.3" opacity="0.2"/>
</svg>
